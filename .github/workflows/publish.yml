name: Publish to GitHub Packages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Configure npm auth
        run: |
          printf '@polumeyv:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n' "${{ secrets.GITHUB_TOKEN }}" > .npmrc

      - name: Bump patch version
        run: |
          OLD=$(node -p "require('./package.json').version")
          NEW=$(node -p "const [a,b,c]=require('./package.json').version.split('.'); \`\${a}.\${b}.\${+c+1}\`")
          node -e "const fs=require('fs');const p=require('./package.json');p.version='$NEW';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Bumped $OLD -> $NEW"

      - run: bun publish --access public
